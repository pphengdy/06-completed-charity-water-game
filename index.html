<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>charity: water Game Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <div class="header">
            <img src="img/cw_logo_horizontal.png" alt="charity: water" class="logo" aria-hidden="true">
            <h1>Jerry Can Runner</h1>
        </div>

        <section id="game" class="game" aria-label="Jerry Can Runner gameplay area">
            <div class="hud">
                <div id="hearts" class="hearts" aria-live="polite">❤️❤️❤️</div>
                <div id="score" class="score" aria-live="polite">Score: 0</div>
            </div>

            <div id="startOverlay" class="overlay show">
                <h2>Choose Difficulty</h2>
                <div class="difficulty-buttons" role="group" aria-label="Select game difficulty">
                    <button class="difficulty-button" data-difficulty="easy" type="button">Easy</button>
                    <button class="difficulty-button" data-difficulty="medium" type="button">Medium</button>
                    <button class="difficulty-button" data-difficulty="hard" type="button">Hard</button>
                </div>
                <p id="startPrompt">Pick a difficulty, then press SPACE or TAP to jump.</p>
            </div>

            <div id="gameOverOverlay" class="overlay" hidden>
                <h2>Game Over</h2>
                <p id="finalScore">Final Score: 0</p>
                <button id="restartButton" type="button">Restart</button>
            </div>
            <div id="jumpInfoMessage" class="info-message">Hold longer for a higher jump!</div>
            <div class="track"></div>
            <div id="runner" class="runner" aria-label="runner" role="img">🏃</div>
        </section>

        <footer class="footer">
            <p>Support <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charity: water</a> and <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">donate today</a>.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
